<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theater Ticket</title>
  <style>
    /* RESET DAN DASAR */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #222;
      color: white;
    }

    /* HEADER NAV */
    .header1 {
      display: flex;
      gap: 30px;
      padding: 15px 50px;
      background-color: #333;
      flex-wrap: wrap;
    }
    .header1 h2 {
      cursor: pointer;
      margin: 0;
    }

    .horizontal {
      height: 4px;
      width: 100%;
      background-color: rgba(128,128,128,0.3);
    }

    /* MAIN CONTAINER */
    .container {
      display: flex;
      gap: 30px;
      padding: 20px 50px;
      flex-wrap: wrap;
    }

    /* IMAGE POSTER */
    .gambar {
      flex: 1 1 250px;
      max-width: 250px;
    }
    .gambar img {
      width: 100%;
      height: auto;
      border-radius: 15px;
      background-color: brown;
      object-fit: cover;
    }

    /* FILM INFO */
    .isi {
      flex: 2 1 300px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .isi span {
      font-weight: bold;
      font-size: 20pt;
    }
    .tonton {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .tonton h3 {
      cursor: pointer;
      padding: 8px 15px;
      border-radius: 8px;
      text-align: center;
      background-color: brown;
      color: white;
      font-size: 14pt;
      margin: 0;
      flex: 1;
    }
    #download {
      background-color: #555;
    }
    #sinopsis {
      width: 100%;
      max-width: 500px;
      height: 250px;
      background-color: #bbb;
      color: black;
      padding: 15px;
      border-radius: 8px;
      overflow-y: auto;
      font-size: 14pt;
      line-height: 1.4;
    }

    /* FILM SELECTION */
    .pilih {
      flex: 1 1 250px;
      background-color: brown;
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      height: fit-content;
    }
    .pilih select, .pilih input, .pilih button {
      border: 0;
      border-radius: 8px;
      width: 100%;
      height: 40px;
      padding-left: 10px;
      font-size: 14pt;
    }
    #harga {
      background-color: white;
      color: black;
      padding-left: 10px;
      line-height: 40px;
      font-weight: bold;
    }
    #bayar {
      font-weight: bold;
      font-size: 16pt;
    }
    button {
      background-color: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 14pt;
    }
    button:hover {
      background-color: #eee;
    }

    /* MEDIA QUERY UNTUK LAYAR KECIL */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        padding: 20px;
        gap: 20px;
      }

      .header1 {
        gap: 10px;
        padding: 10px;
      }

      .gambar, .pilih {
        max-width: 100%;
      }

      .isi {
        max-width: 100%;
      }

      .tonton h3 {
        font-size: 12pt;
        padding: 10px;
        flex: 100%;
      }

      #sinopsis {
        max-width: 100%;
        height: auto;
      }

      .pilih select, .pilih input, .pilih button {
        height: 50px;
        font-size: 16pt;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header1">
    <h2>Theater</h2>
    <h2>Tv Show</h2>
    <h2>Movies</h2>
    <h2>Videos</h2>
  </div>
  <div class="horizontal"></div>

  <!-- MAIN -->
  <div class="container">
    <!-- IMAGE -->
    <div class="gambar">
      <img src="BS.png" alt="Poster Film" id="img">
    </div>

    <!-- FILM INFO -->
    <div class="isi">
      <span id="judul">The Conjuring: Last Rites</span>
      <div class="tonton">
        <h3 id="tonton">Tonton</h3>
        <h3 id="download">Download</h3>
      </div>
      <h3>Sinopsis</h3>
      <p id="sinopsis">Sinopsis The Conjuring: Last Rites. Lorem ipsum dolor sit amet consectetur adipisicing elit...</p>
    </div>

    <!-- FILM SELECTION -->
    <div class="pilih">
      <h3>Pilih Film</h3>
      <select id="film">
        <option value="">-- Daftar Film --</option>
        <option value="film1">The Conjuring: Last Rites</option>
        <option value="film2">Exit 8</option>
        <option value="film3">The Long Walk</option>
        <option value="film4">Merah Putih: One For All</option>
        <option value="film5">Marsha And The Bear</option>
      </select>

      <h3>Harga:</h3>
      <p id="harga">45000</p>

      <p>Jumlah Tiket:</p>
      <input type="number" id="j_tiket" min="1" value="1">

      <p>Jumlah Bayar: <br><span id="bayar">Rp45.000</span></p>
      <button onclick="hitung()">Bayar</button>
    </div>
  </div>

  <script>
    let harga = 45000; // default film
    const filmData = {
      film1: {judul:"The Conjuring: Last Rites", img:"BS.png", harga:45000, sinopsis:"Sinopsis The Conjuring: Last Rites. Lorem ipsum dolor sit amet consectetur..."},
      film2: {judul:"Exit 8", img:"E8.jpg", harga:30000, sinopsis:"Sinopsis Exit 8. Lorem ipsum dolor sit amet consectetur..."},
      film3: {judul:"The Long Walk", img:"TLW.jpg", harga:40000, sinopsis:"Sinopsis The Long Walk. Lorem ipsum dolor sit amet consectetur..."},
      film4: {judul:"Merah Putih: One For All", img:"MP.png", harga:50000, sinopsis:"Sinopsis Merah Putih: One For All. Lorem ipsum dolor sit amet..."},
      film5: {judul:"Marsha And The Bear", img:"ES.png", harga:50000, sinopsis:"Sinopsis Marsha And The Bear. Lorem ipsum dolor sit amet..."}
    };

    const selectElement = document.getElementById('film');
    const imgElement = document.getElementById('img');
    const judulElement = document.getElementById('judul');
    const sinopsisElement = document.getElementById('sinopsis');
    const hargaElement = document.getElementById('harga');
    const bayarElement = document.getElementById('bayar');

    selectElement.addEventListener("change", function() {
      const value = selectElement.value;
      if(filmData[value]){
        const film = filmData[value];
        imgElement.src = film.img;
        judulElement.textContent = film.judul;
        sinopsisElement.textContent = film.sinopsis;
        harga = film.harga;
        hargaElement.textContent = harga;
        hitung(); // otomatis update jumlah bayar saat ganti film
      }
    });

    function hitung(){
      const j_tiket = parseInt(document.getElementById('j_tiket').value) || 0;
      const total = harga * j_tiket;
      bayarElement.textContent = `Rp${total.toLocaleString('id-ID')}`;
    }

    // inisialisasi default bayar
    hitung();
  </script>
</body>
</html>
