<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="menu-container">
            <div class="logo">Store.app</div>

            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Product</a></li>
                <li><a href="#">Gallery</a></li>
            </ul>
        </div>
    </nav>
    <div id="carousel">
        <button id="prev">⏮️</button>

        <div id="carousel-bks">
            <img src="img/coding.jpg" alt="banner 1" class="slide">
            <img src="img/WIN_20250805_08_54_46_Pro.jpg" alt="banner 2" class="slide">
            <img src="img/coding.jpg" alt="banner 3" class="slide">

        </div>
        <button id="next">⏭️</button>
    </div>

    <script>
        const slide = document.querySelectorAll('.slide');
        const bks = document.getElementById('carousel-bks');
        const nextBtn = document.getElementById('next');
        const prevBtn = document.getElementById('prev');

        let currentIndex = 0 

        function showSlide(index){
            bks.style.transform = `translateX(-${index * 100}%)`;

        }

        nextBtn.addEventListener('click' , () => {
            currentIndex = (currentIndex + 1) % slide.length;
            showSlide(currentIndex);
        });

        prevBtn.addEventListener('click', ()=>{
            currentIndex = (currentIndex - 1 + slide.length) % slide.length
            showSlide(currentIndex)
        })
    </script>
</body>
</html>
